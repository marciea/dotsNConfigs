##### -------------------------------------------------
##### TPM / PLUGIN ROOT , set in case of custom plugin
##### -------------------------------------------------

set-environment -gF TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
# looks like: /Users/marcie/.tmux/plugins/<plugin f.e. :tpm>

##### -------------------------------------------------
##### KEYBINDS / GENERAL UX
##### -------------------------------------------------

# Rebind prefix to C-\.
# I do prefer C-a however it conflcits with terminal keybind.

unbind-key C-b
set -g prefix 'C-\'
bind-key 'C-\' send-prefix

# Vim-like pane navigation
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# History / scrollback
set -g history-limit 100000


# Clear scrollback buffer
unbind '"'
bind '"' clear-history \; display-message -d 2000 "Buffer cleared!"

# Mouse support (ikik vim keys with mouse support but wtv)
set -g mouse on

# Terminal / colors
set -g default-terminal "tmux-256color"

# Intuitive splits (- = horizontal , | = vertical)
unbind '%'
bind | split-window -h
bind - split-window -v

# Status bar on top 
# prefer this look + helps to not conflict with LazyVim configuraiton
set -g status-position top

# Start indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# Clipboard
set -s set-clipboard external

# Reload config keybind
unbind r
bind r source-file "$HOME/.tmux.conf" \; display-message -d 2000 "Configuration reloaded!"

# Restore Ctrl-L-clear functionality.
set -g @vim_navigator_prefix_mapping_clear_screen ""


##### -------------------------------------------------
##### PLUGINS (TPM)
##### -------------------------------------------------

set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'joshredeski/tmux-nerd-font-window-name' # -- Names windows like this:  Neovim
# set -g @plugin 'xamut/tmux-spotify' -- This is commented out for the reason that I think most people would not want to have this sort of thing enabled
# - To find out more about this plugin simply look up the plugin name.

##### -------------------------------------------------
##### CATPPUCCIN CONFIG
##### -------------------------------------------------

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_windw_number_position "right"

set -g @catppuccin_window_current_number_color "#{@thm_red}"
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"
set -g @catppuccin-tmux_show_git 1

set -g @catppuccin_pane_border_status "on"
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
# For more information on the exact meaning behind each configuration look to this link:
# https://github.com/catppuccin/tmux/blob/main/docs/reference/configuration.md
# If this link is gone or changed, look towards the official catppuccin tmux Github repo


# If you are using Lazyvim along with image.nvim -
# -(loads images within notes; inside of Obsidian notes in my use case)
# Uncomment if needed
# Required by image.nvim to help with TMUX functionality
#set -gq allow-passthrough on
#set -g visual-activity off
#set-option -g focus-events on

##### -------------------------------------------------
##### LOAD CATPPUCCIN
##### -------------------------------------------------

run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'

##### -------------------------------------------------
##### CATPPUCCIN STATUS LINE 
##### -------------------------------------------------

set -g status-left-length 10
set -g status-right-length 100
set -g status-left ""
set -g status-right ""
set -g status-left-style none
set -g status-right-style none

# Catppuccin status modules
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_session}"

##### -------------------------------------------------
##### TPM INITIALIZATION (MUST BE LAST)
##### -------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
